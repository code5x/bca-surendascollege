<!DOCTYPE html>
<html lang="en" data-theme="dark">

  <title>Page Not Found</title>
<style>
/* Always dark */
html[data-theme="dark"] {
  color-scheme: dark;
}

/* ===== RESET / BASE FIX ===== */
html, body {
  height: 100%;     
  margin: 0;       
  padding: 0;     
  color:#e6e9ef;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial
}

body {
  display: flex;
  flex-direction: column;
}

* {
  box-sizing: border-box;    
}

/* ===== BODY BACKGROUND WITH IMAGE + OVERLAY ===== */
body.bg-app {
  margin: 0;
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
  -webkit-font-smoothing: antialiased;
  color: #e6e9ef;

  /* Default desktop background */
  background: url("/src/background.webp") no-repeat center center fixed;
  background-size: cover;
  position: relative;
}

/* Mobile background */
@media (max-width: 768px) {
  body.bg-app {
    background: url("/src/background-mobile.webp") no-repeat center center fixed;
    background-size: cover;
  }
}

/* Black overlay */
body.bg-app::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.8);
  z-index: -1; /* keeps overlay behind all content */
}


/* container */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 18px;
  box-sizing: border-box;

  display: flex;              /* make it a flexbox */
  flex-direction: column;     /* stack title + svg vertically */
  align-items: center;        /* center horizontally */
  justify-content: center;    /* center vertically if needed */
  text-align: center;         /* center text inside */

}

/* Header */

header {
  background: #0b2a6b; 
  padding: 4px 10px;
  display: flex;
/*  justify-content: space-between;
  align-items: center;  */
  position: relative;   /* stays visible */
  top: 0;
  left: 0;
  width: 100%;       /* full width */
  z-index: 1000;
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
  border-radius: 0 0 8px 8px;
}


.back-btn {
  display: flex;    
/*  align-items: center;
  gap: 10px;*/
  padding: 6px 10px;
  text-decoration: none;   
  font-weight: 700;
  cursor: pointer;
  border: transparent;
  color: #fff;
  background: transparent;
}

.head-title1 {
  width: 100%;
  color: #f0cef2;
  text-align: center;
  margin: 10px auto 0;
  font-size: 1.9rem;
}

.head-title2 {
  width: 100%;
  color: #f0cef2; 
  text-align: center;
  margin: 0 auto 10px;
  font-size: 1.3rem;
  font-weight: 500;
}

.lead {
  display: block;
  margin: 5px auto;
  text-align: justify;
  color: #fff;
  position: relative;
  z-index: 5;
  font-size: 1rem;
  line-height: 1.4;
}

.lead2 {
  display: block;
  margin: 5px auto;
  text-align: justify;
  color: #d3d8f5;
  position: relative;
  z-index: 5;
  font-size: 0.9rem;                                              
  line-height: 1.4;
}


.home-btn {
  background: #753678;
  color: #fff;
  max-width: 200px;
  text-align: center;
  border-radius: 10px;
  border: 2px solid #b088b5;
  padding: 8px 15px;
  margin: 17px auto;
  cursor: pointer;
  text-decoration: none; /* removes underline */
  display: block; /* makes it behave like your old div */
}

    svg {
      width: 310px;
      height: 200px;     
   }

    .main-box {
      fill: rgba(115, 230, 228, 0.2);
      stroke: #ad7bb0;
      stroke-width: 2;
    }

    .bar-1 { fill: #6092e0; }
    .bar-2 { fill: #4e9937; }
    .bar-3 { fill: #e060ad; }
    .bar-4 { fill: #3c4b80; }


/* ===== FOOTER ===== */
footer {
    background: #111;
    text-align: center;
    padding: 1px;
    color: #aaa;
     font-size: 0.85rem;
    border-top: 1px solid #333;
    border-radius: 20px 20px 0 0;
    margin-top: auto;
}
@media (min-width: 769px) {
  footer {
    font-size: 1.25rem;
  }
  .container { padding: 40px; }

}
footer a {
    color: #f7c2d9;
    text-decoration: none;
}
footer a:hover {
    text-decoration: underline;
}

@media (max-width: 768px) {
    /* Hide scrollbar for Chrome, Safari and Edge */
    *::-webkit-scrollbar {
        display: none;
    }

    /* Hide scrollbar for Firefox */
    * {
        scrollbar-width: none;
    }

    /* Hide scrollbar for IE and old Edge */
    * {
        -ms-overflow-style: none;
    }
}

</style>



</head>
