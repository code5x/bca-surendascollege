  <!-- Link to external CSS file -->
<style>
html[data-theme="dark"] {
  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: #e6e9ef;
  line-height: 1.4;
}

body.bg-app {
  background: url("/src/background.webp") no-repeat center center fixed;
  background-size: cover;
  position: relative;
}

@media (max-width: 768px) {
  body.bg-app {
    background: url("/src/background-mobile.webp") no-repeat center center fixed;
    background-size: cover;
  }
}

body.bg-app::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 0;
  pointer-events: none;
}

.page-wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */

header {
  background: #0b2a6b;
  padding: 4px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: fixed;   /* stays visible */
  top: 0;
  left: 0;
  width: 100%;       /* full width */
  z-index: 1000;
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
  animation: slideDown 1s ease;
}

/* Navigation */
header nav {
  display: flex;
  gap: 8px;
  overflow-x: auto; /* enable horizontal scroll */
  white-space: nowrap; /* keep links in a single line */
  scrollbar-width: none; /* hide scrollbar (Firefox) */
}

header nav::-webkit-scrollbar {
  display: none; /* hide scrollbar (Chrome, Edge, Safari) */
}

header nav a {
  text-decoration: none;
  color: #fff;
  font-size: 0.9rem;
  font-weight: 450;
  padding: 6px 13px;
  border-radius: 6px;
  transition: all 0.3s ease;
  background: transparent;
  flex-shrink: 0; /* prevent shrinking of links */
  border: 1px solid #6974c7;
}


header nav a:hover {
  background: #0b5ed7;
}


@media (min-width: 769px) {
  header nav a {
    font-size: 1rem;
    font-weight: 500;
    padding: 8px 13px;
  }
}


@keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
}


/* Main area */
.main-content {
  width: 100%;
  max-width: 1100px;
  flex: 1 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 20px;
}

/* Title + description */
.page-title {
  margin: 60px 0 6px;
  text-align: center;
  color: #ffffff;
  font-weight: 700;
  font-size: 1.5rem;
  letter-spacing: 0.5px;
}
.page-lead {
  margin: 0 0 24px;
  text-align: center;
  color: #cfd3fa;
  font-size: 1rem;
}

.grid-one {
  display: flex;
  flex-wrap: wrap;      /* allow wrapping */
  gap: 20px;            /* space between cards */
  justify-content: center;  /* center the row */
  align-content: flex-start; /* keep rows packed from the top */
}

.card {
  width: 100%;
  max-width: 400px;
  aspect-ratio: 1.3 / 1;
  background: rgba(0, 0, 0, 0.5);
  border-radius: 10px;
  padding: 18px;
  display: flex;
  flex-wrap: wrap; 
  position: relative;
  box-shadow: 0 8px 20px rgba(0,0,0,0.45);
  overflow: hidden;
  border: 2px solid #a69aa5;

  flex: 0 1 400px;       /* base size 400px, shrink on small screens, no grow */
  box-sizing: border-box;
}
.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

/* Logo */
.logo img {
  width: 100%;
  height: auto;
  display: block;
  object-fit: contain;
}

/* Actions stacked vertically */
.card-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;    /* center buttons horizontally */
  width: 100%;            /* stretch across card width */
  box-sizing: border-box; /* respect card padding */
}


.view-btn,
.download-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 6px;  
  border-radius: 8px;
  text-decoration: none;
  font-weight: 650;
  font-size: 0.9rem;
  cursor: pointer;
  transition: transform .12s ease, box-shadow .12s ease;
  color: #ffffff;
  margin: 10px 0 0 0;  
  background: #825f87;
  border: 1px solid #a69aa5;
  width: 90%;
  max-width: 150px;
  text-align: center;
}

.view-btn:hover,
.download-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.45);
}


/* Title */
.card-title {
  margin-top: 1px;
  color: #ffffff;
  font-size: 1.05rem;
  font-weight: 500;
  text-align: left;
  letter-spacing: 0.2px;
}


footer {
    background: #111;
    text-align: center;
    padding: 1px;
/*    margin-top: 5px;  */
    color: #aaa;
     font-size: 0.85rem;
 /*   font-size: clamp(0.85rem, 1vw, 2rem);  */
    border-top: 1px solid #333;
    border-radius: 20px 20px 0 0;
    margin-top: auto;
}

@media (min-width: 769px) {
  footer {
    font-size: 1.25rem;
  }
}
footer a {
    color: #f7c2d9;
    text-decoration: none;
}
footer a:hover {
    text-decoration: underline;
}


#overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
}

.overlay-content {
    width: 100%;
    height: 100%;
    background: #fff;
    position: relative;
}

.close-btn {
    position: absolute;
    top: 32px;
    right: 0;
    margin: 0;
    background: #262323;
    color: white;
    border: none;
    padding: 7px 10px;
    font-size: 20px;
    cursor: pointer;
    border-radius: 2px;
    z-index: 1000;
}

#pdfFrame {
    width: 100%;
    height: 100%;
    border: none;
}

/* Responsive tweak */

@media (min-width: 769px) {
.card { aspect-ratio: 1.4 / 1; }
 .card-title { font-size: 1.3rem; }
 .page-title { font-size: 2rem; }
 .view-btn,
 .download-btn { padding: 8px; font-size: 1.2rem; }
 .logo img { width: calc(100% + 10px);
}


}
.btn:focus {
  outline: 3px solid rgba(183, 222, 255, 0.45);
  outline-offset: 2px;
  border-radius: 8px;
}

</style>

<script>
let pdfViewerOpen = false;
let fakeStatePushed = false; // track if fake state is already pushed

// ===== AUTO-BUILD CARDS =====
const routineSection = document.getElementById("routine-list");
const logoTemplate = document.getElementById("logo-template").src; // get base64 logo

routineSection.querySelectorAll("div").forEach((item, index) => {
  const file = item.getAttribute("data-file");
  const title = item.getAttribute("data-title");

  // Create the card HTML
  item.outerHTML = `
    <article class="card" aria-labelledby="card${index+1}title">
      <div class="card-top">
        <div class="logo">
          <img class="card-logo" src="${logoTemplate}" alt="Logo">
        </div>
        <div class="card-actions" role="group" aria-label="Actions" data-file="${file}">
          <a class="view-btn" href="#">View</a>
          <a class="download-btn" href="#">Download</a>
        </div>
      </div>
      <h2 id="card${index+1}title" class="card-title">${title}</h2>
    </article>
  `;
});

// ===== PDF BUTTON HANDLING =====
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("download-btn")) {
    e.preventDefault();
    const card = e.target.closest(".card-actions");
    const pdfFile = card.getAttribute("data-file");
    const a = document.createElement("a");
    a.href = pdfFile;
    a.download = pdfFile.split("/").pop();
    a.click();
  } else if (e.target.classList.contains("view-btn")) {
    e.preventDefault();
    const card = e.target.closest(".card-actions");
    const pdfFile = card.getAttribute("data-file");
    openPDF(pdfFile);
  }
});

function openPDF(pdfFile) {
  if (pdfViewerOpen) return;

  document.getElementById("pdfFrame").src =
    "https://mozilla.github.io/pdf.js/web/viewer.html?file=" + pdfFile;
  document.getElementById("overlay").style.display = "block";

  pdfViewerOpen = true;

  if (!fakeStatePushed) {
    history.pushState({ pdfOpen: true }, "", location.href);
    fakeStatePushed = true;
  }
}

// Close button
document.querySelectorAll(".close-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    if (pdfViewerOpen) {
      history.back();
      setTimeout(() => history.back(), 50);
    }
  });
});

// Popstate handling
window.addEventListener("popstate", () => {
  if (pdfViewerOpen) {
    document.getElementById("overlay").style.display = "none";
    document.getElementById("pdfFrame").src = "";
    pdfViewerOpen = false;
    fakeStatePushed = false;
  }
});

</script>
